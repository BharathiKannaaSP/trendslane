name: Trendslane Deploy

on:
  push:
    branches:
      - main

jobs:
  # 🧹 1️⃣ Lint Stage
  lint:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changes.outputs.changed }}
    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🧩 Setup PNPM
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      # Turbo Cache Setup
      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Detect changed apps
        id: changes
        run: |
          echo "Checking for changed apps..."
          git fetch --unshallow || true
          git fetch origin main

          if [ $(git rev-list --count HEAD) -eq 1 ]; then
            CHANGED=$(ls apps | xargs)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '^apps/' | cut -d'/' -f2 | sort -u | xargs)
          fi

          if [ -z "$CHANGED" ]; then
            CHANGED="none"
          fi

          echo "Changed apps: $CHANGED"
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: 🧹 Run Lint on Changed Apps
        if: steps.changes.outputs.changed != 'none'
        run: |
          for app in ${{ steps.changes.outputs.changed }}; do
            echo "🧹 Linting $app..."
            pnpm turbo run lint --filter=$app
          done

  # 🧪 2️⃣ Test Stage
  test:
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      changed: ${{ needs.lint.outputs.changed }}
    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🧩 Setup PNPM
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧪 Run Tests on Changed Apps
        if: needs.lint.outputs.changed != 'none'
        run: |
          for app in ${{ needs.lint.outputs.changed }}; do
            echo "🧪 Testing $app..."
            pnpm turbo run test --filter=$app
          done

  # 🏗️ 3️⃣ Build Stage
  build:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      changed: ${{ needs.test.outputs.changed }}
    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🧩 Setup PNPM
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build Changed Apps
        if: needs.test.outputs.changed != 'none'
        run: |
          for app in ${{ needs.test.outputs.changed }}; do
            echo "🏗️ Building $app..."
            pnpm turbo run build --filter=$app
          done

  # 🚀 4️⃣ Deploy Stage
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      deployments: write
    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🧩 Setup PNPM
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🚀 Deploy Changed Apps to Vercel
        if: needs.build.outputs.changed != 'none'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID_ADMIN: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}

        run: |
          for app in ${{ needs.build.outputs.changed }}; do
            echo "🚀 Deploying $app..."
            
            if [ "$app" = "admin" ]; then
              cd apps/admin
              VERCEL_ORG_ID=$VERCEL_ORG_ID \
              VERCEL_PROJECT_ID=$VERCEL_PROJECT_ID_ADMIN \
              npx vercel deploy --yes --prod --token=$VERCEL_TOKEN
              cd ../..
            fi
          done
