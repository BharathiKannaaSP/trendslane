name: Trendslane Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: trendslane-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint • Typecheck • Build
    runs-on: ubuntu-latest

    env:
      AUTH_DATABASE_URL: ${{ secrets.AUTH_DATABASE_URL }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup PNPM
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Cache PNPM Store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter=@workspace/auth-db run db:generate

      - name: Run Lint
        run: pnpm turbo run lint

      - name: Run Typecheck
        run: pnpm turbo run typecheck

      - name: Run Build
        run: pnpm turbo run build

  deploy:
    name: Deploy Applications
    runs-on: ubuntu-latest
    needs: ci

    permissions:
      contents: read
      deployments: write

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID_ADMIN: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}

      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_AUTH_SERVICE_ID: ${{ secrets.RENDER_AUTH_SERVICE_ID }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup PNPM
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Admin to Vercel
        run: |
          cd apps/admin

          VERCEL_ORG_ID=$VERCEL_ORG_ID \
          VERCEL_PROJECT_ID=$VERCEL_PROJECT_ID_ADMIN \
          npx vercel deploy \
            --prod \
            --yes \
            --token=$VERCEL_TOKEN

      - name: Deploy Auth Service to Render
        run: |
          curl -X POST \
            "https://api.render.com/v1/services/$RENDER_AUTH_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json"
