name: Trendslane Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: trendslane-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1. LINT
  lint:
    runs-on: ubuntu-latest

    outputs:
      changed: ${{ steps.changes.outputs.changed }}

    steps:
      - name: 🛎️ Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 🧩 Setup PNPM
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: 💾 Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: 🔍 Detect Changed Apps
        id: changes
        run: |
          echo "Checking changed apps..."

          if [ "$(git rev-list --count HEAD)" -eq 1 ]; then
            CHANGED=$(ls apps | xargs)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD \
              | grep '^apps/' \
              | cut -d'/' -f2 \
              | sort -u \
              | xargs)
          fi

          if [ -z "$CHANGED" ]; then
            CHANGED="none"
          fi

          echo "Changed apps: $CHANGED"
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: 🧹 Run Lint
        if: steps.changes.outputs.changed != 'none'
        run: |
          for app in ${{ steps.changes.outputs.changed }}; do
            echo "Linting $app..."
            pnpm turbo run lint --filter=$app
          done

  # 2. TYPECHECK
  typecheck:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: 🛎️ Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 🧩 Setup PNPM
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: 🔎 Run Typecheck
        if: needs.lint.outputs.changed != 'none'
        run: |
          for app in ${{ needs.lint.outputs.changed }}; do
            echo "Typechecking $app..."
            pnpm turbo run typecheck --filter=$app
          done

  # =========================
  # 3. BUILD
  # =========================
  build:
    runs-on: ubuntu-latest

    needs:
      - lint
      - typecheck

    outputs:
      changed: ${{ needs.lint.outputs.changed }}

    env:
      DATABASE_URL: ${{ secrets.AUTH_SERVICE_DB }}
      DIRECT_URL: ${{ secrets.AUTH_SERVICE_DIRECT_URL }}

    steps:
      - name: 🛎️ Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 🧩 Setup PNPM
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: 💾 Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: 🧬 Generate Prisma Client
        run: pnpm --filter=auth-db run db:generate

      - name: 🏗️ Build Changed Apps
        if: needs.lint.outputs.changed != 'none'
        run: |
          for app in ${{ needs.lint.outputs.changed }}; do
            echo "Building $app..."
            pnpm turbo run build --filter=$app
          done

  # =========================
  # 4. DEPLOY
  # =========================
  deploy:
    runs-on: ubuntu-latest

    needs:
      - build

    if: needs.build.outputs.changed != 'none'

    permissions:
      contents: read
      deployments: write

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID_ADMIN: ${{ secrets.VERCEL_PROJECT_ID_ADMIN }}

      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_AUTH_SERVICE_ID: ${{ secrets.RENDER_AUTH_SERVICE_ID }}

    steps:
      - name: 🛎️ Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 🧩 Setup PNPM
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: 🚀 Deploy Changed Apps
        run: |
          for app in ${{ needs.build.outputs.changed }}; do

            if [ "$app" = "admin" ]; then
              echo "🚀 Deploying Admin to Vercel"

              cd apps/admin

              VERCEL_ORG_ID=$VERCEL_ORG_ID \
              VERCEL_PROJECT_ID=$VERCEL_PROJECT_ID_ADMIN \
              npx vercel deploy \
                --prod \
                --yes \
                --token=$VERCEL_TOKEN

              cd ../..
            fi

            if [ "$app" = "auth-service" ]; then
              echo "🚀 Deploying Auth Service to Render"

              curl -X POST \
                "https://api.render.com/v1/services/$RENDER_AUTH_SERVICE_ID/deploys" \
                -H "Authorization: Bearer $RENDER_API_KEY" \
                -H "Accept: application/json"
            fi

          done
