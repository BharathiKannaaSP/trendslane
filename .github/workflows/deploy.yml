name: Trendslane Test & Deploy to vercel

on:
  push:
    branches:
      - main

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout Code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch full history so git diff works properly

      # 2️⃣ Setup Node.js + PNPM
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup PNPM
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      # 3️⃣ Turbo Cache Setup
      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      # 4️⃣ Install Dependencies
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # 5️⃣ Detect Changed App Folders
      - name: Detect changed app folders
        id: changes
        run: |
          echo "Checking for changed apps..."
          # Ensure full history is available
          git fetch --unshallow || true
          git fetch origin main

          if [ $(git rev-list --count HEAD) -eq 1 ]; then
            CHANGED=$(ls apps | xargs)
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '^apps/' | cut -d'/' -f2 | sort -u | xargs)
          fi 
             
          if [ -z "$CHANGED" ]; then
            echo "⚠️ No app changes detected, skipping deploys."
            CHANGED="none"
          fi

          echo "Changed apps: $CHANGED"
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      # 6️⃣ Run Tests (Client + Admin only)
      - name: Run Jest tests (Client + Admin only)
        if: contains(steps.changes.outputs.changed, 'admin')
        run: |
          if echo "${{ steps.changes.outputs.changed }}" | grep -q 'client'; then
            echo "🧪 Running tests in client..."
            pnpm turbo run test --filter=client || exit 1
          fi

          if echo "${{ steps.changes.outputs.changed }}" | grep -q 'admin'; then
            echo "🧪 Running tests in admin..."
            pnpm turbo run test --filter=admin || exit 1
          fi

      # ✅ Notify Vercel: Tests completed
      - name: Notify Vercel (test)
        if: always()
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: "Vercel - trendslane-admin: test"

      # 7 Deploy Admin (only if changed)
      - name: Deploy Admin App
        if: contains(steps.changes.outputs.changed, 'admin')
        run: |
          echo "🚀 Deploying Admin App..."
          curl -X POST "$VERCEL_HOOK_ADMIN"
        env:
          VERCEL_HOOK_ADMIN: ${{ secrets.VERCEL_HOOK_ADMIN }}
